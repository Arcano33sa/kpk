<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="KSA PRÁCTIKA — control operativo de OC, cobros, proveedores, pagos, gastos, seguimiento, casa, notas, facturas, calculadora, mora, alertas, tablero, importación/exportación Excel, cierre mensual, configuración, roles locales y respaldo JSON validado." />
  <title>KSA PRÁCTIKA</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon-192.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#mainContent">Saltar al contenido</a>

  <header class="app-topbar" role="banner">
    <div class="brand" aria-label="KSA PRÁCTIKA">
      <img class="brand-logo" src="assets/ksa-logo.png" alt="" aria-hidden="true" decoding="async" />
      <div class="brand-text">
        <strong>KSA PRÁCTIKA</strong>
        <span>Control operativo</span>
      </div>
    </div>

    <nav class="top-nav" aria-label="Navegación principal">
      <button type="button" class="nav-btn" data-route="home" aria-label="Ir al Menú principal" title="Menú">
        <span aria-hidden="true">⌂</span><small>Menú</small>
      </button>
      <button type="button" class="nav-btn" data-route="resumen" aria-label="Ir a Resumen" title="Resumen">
        <span aria-hidden="true">▦</span><small>Resumen</small>
      </button>
      <button type="button" class="nav-btn" data-route="mora" aria-label="Ir a Mora y Alertas" title="Mora y Alertas">
        <span aria-hidden="true">⚠</span><small>Mora</small>
      </button>
      <button type="button" class="nav-btn" data-route="ventas" aria-label="Ir a Ventas y OC" title="Ventas">
        <span aria-hidden="true">OC</span><small>Ventas</small>
      </button>
      <button type="button" class="nav-btn" data-route="cobros" aria-label="Ir a Cobros" title="Cobros">
        <span aria-hidden="true">↧</span><small>Cobros</small>
      </button>
      <button type="button" class="nav-btn" data-route="proveedores" aria-label="Ir a Proveedores" title="Proveedores">
        <span aria-hidden="true">◫</span><small>Prov.</small>
      </button>
      <button type="button" class="nav-btn" data-route="pagos" aria-label="Ir a Pagos" title="Pagos">
        <span aria-hidden="true">↥</span><small>Pagos</small>
      </button>
      <button type="button" class="nav-btn" data-route="gastos" aria-label="Ir a Gastos" title="Gastos">
        <span aria-hidden="true">–</span><small>Gastos</small>
      </button>
      <button type="button" class="nav-btn" data-route="seguimiento" aria-label="Ir a Seguimiento" title="Seguimiento">
        <span aria-hidden="true">☎</span><small>Seguim.</small>
      </button>
      <button type="button" class="nav-btn" data-route="casa" aria-label="Ir a Casa" title="Casa">
        <span aria-hidden="true">CA</span><small>Casa</small>
      </button>
      <button type="button" class="nav-btn" data-route="notas" aria-label="Ir a Notas" title="Notas">
        <span aria-hidden="true">✎</span><small>Notas</small>
      </button>
      <button type="button" class="nav-btn" data-route="facturas" aria-label="Ir a Facturas" title="Facturas">
        <span aria-hidden="true">FC</span><small>Fact.</small>
      </button>
      <button type="button" class="nav-btn" data-route="catalogos" aria-label="Ir a Catálogos" title="Catálogos">
        <span aria-hidden="true">☷</span><small>Cat.</small>
      </button>
      <button type="button" class="nav-btn" data-route="calculadora" aria-label="Ir a Calculadora" title="Calculadora">
        <span aria-hidden="true">123</span><small>Calc.</small>
      </button>
      <button type="button" class="nav-btn" data-route="bdatos" aria-label="Ir a Bdatos" title="Bdatos">
        <span aria-hidden="true">BD</span><small>Bdatos</small>
      </button>
      <button type="button" class="nav-btn" data-route="configuracion" aria-label="Ir a Configuración" title="Configuración">
        <span aria-hidden="true">⚙</span><small>Config.</small>
      </button>
    </nav>
  </header>

  <div id="ksaToastRegion" class="ksa-toast-region" role="region" aria-live="polite" aria-label="Notificaciones de la aplicación"></div>

  <main id="mainContent" class="app-shell" tabindex="-1">
    <section id="periodWorkbar" class="work-period-bar" aria-live="polite"></section>
    <section id="viewRoot" aria-live="polite"></section>
  </main>

  <noscript>
    <div class="noscript-card">KSA PRÁCTIKA necesita JavaScript para funcionar.</div>
  </noscript>

  <script src="vendor/jszip.min.js" defer></script>
  <script src="firebase-config.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
